name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: PHP Lint
        run: |
          ERRORS=0
          find . -name "*.php" | while read file; do
            php -l "$file" 2>&1 || ERRORS=1
          done
          exit $ERRORS
